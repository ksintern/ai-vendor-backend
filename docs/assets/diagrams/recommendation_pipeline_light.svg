<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" width="100%" height="100%">
  <defs>
    <!-- Shadows -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="30" y="45" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#0F172A">Recommendation Scoring Pipeline</text>
  <text x="30" y="68" font-family="system-ui, sans-serif" font-size="13" fill="#64748B">Flow from raw database queries, sub-score calculations, dynamic weighting parameters, to final rankings (Light Mode)</text>

  <!-- Inputs Panel -->
  <g transform="translate(30, 110)" filter="url(#shadow)">
    <rect width="180" height="360" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="180" height="40" rx="10" fill="#EEF2F6" stroke="none"/>
    <path d="M 0 40 L 180 40" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="90" y="25" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#0F172A" text-anchor="middle">Pipeline Inputs</text>

    <!-- Raw Vendors -->
    <rect x="12" y="55" width="156" height="85" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
    <text x="22" y="78" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#1E293B">Raw DB Candidates</text>
    <text x="22" y="98" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">• Matching name, city</text>
    <text x="22" y="113" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">• Category team logs</text>

    <!-- User Constraints -->
    <rect x="12" y="155" width="156" height="85" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
    <text x="22" y="178" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#1E293B">User Query Rules</text>
    <text x="22" y="198" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">• Target Budget limit</text>
    <text x="22" y="213" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">• Guest counts, cuisines</text>

    <!-- User Preferences -->
    <rect x="12" y="255" width="156" height="85" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
    <text x="22" y="278" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#1E293B">User preferences</text>
    <text x="22" y="298" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">• Favorite category</text>
    <text x="22" y="313" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">• Favorite city match</text>
  </g>

  <!-- Middle: Scoring Calculators Container -->
  <g transform="translate(260, 110)" filter="url(#shadow)">
    <rect width="260" height="360" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="260" height="40" rx="12" fill="#F5F3FF" stroke="none"/>
    <path d="M 0 40 L 260 40" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="130" y="25" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#4C1D95" text-anchor="middle">Sub-Score Evaluators</text>

    <!-- Category -->
    <rect x="15" y="55" width="230" height="35" rx="6" fill="#FDF4FF" stroke="#E879F9" stroke-width="1"/>
    <text x="25" y="76" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#701A75">1. Category Normalizer Fit</text>

    <!-- Budget Fit -->
    <rect x="15" y="98" width="230" height="35" rx="6" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1"/>
    <text x="25" y="119" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#1E40AF">2. Budget Relevance Fit</text>

    <!-- Location -->
    <rect x="15" y="141" width="230" height="35" rx="6" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1"/>
    <text x="25" y="162" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#334155">3. Location City Match</text>

    <!-- Rating -->
    <rect x="15" y="184" width="230" height="35" rx="6" fill="#FFFBEB" stroke="#FBBF24" stroke-width="1"/>
    <text x="25" y="205" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#78350F">4. Numerical Rating Score</text>

    <!-- Reviews -->
    <rect x="15" y="227" width="230" height="35" rx="6" fill="#FFFBEB" stroke="#FBBF24" stroke-width="1"/>
    <text x="25" y="248" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#78350F">5. Review Step Confidence</text>

    <!-- Trust -->
    <rect x="15" y="270" width="230" height="35" rx="6" fill="#ECFDF5" stroke="#34D399" stroke-width="1"/>
    <text x="25" y="291" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#064E3B">6. Trust Verification Bonus</text>

    <!-- Availability -->
    <rect x="15" y="313" width="230" height="35" rx="6" fill="#F0FDF4" stroke="#4ADE80" stroke-width="1"/>
    <text x="25" y="334" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#14532D">7. Availability Match Index</text>
  </g>

  <!-- Category Weight Mapper -->
  <g transform="translate(565, 150)" filter="url(#shadow)">
    <rect width="180" height="240" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="180" height="40" rx="10" fill="#EEF2F6" stroke="none"/>
    <path d="M 0 40 L 180 40" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="90" y="25" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#0F172A" text-anchor="middle">Dynamic Category Weights</text>

    <!-- Weights categories details -->
    <text x="15" y="65" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#1E293B">Catering: Budget prioritised (30%)</text>
    <text x="15" y="85" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#1E293B">Photography: Rating prioritised (30%)</text>
    <text x="15" y="105" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#1E293B">Venues: Location prioritised (30%)</text>
    <path d="M 10 120 L 170 120" stroke="#E2E8F0" stroke-width="1"/>
    <text x="15" y="140" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#4F46E5">Admin Weight Overrides</text>
    <text x="15" y="160" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Override coefficients from DB</text>
    
    <rect x="10" y="180" width="160" height="45" rx="4" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
    <text x="20" y="198" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#1E40AF">Availability Priority Mode</text>
    <text x="20" y="213" font-family="system-ui, sans-serif" font-size="8" fill="#2563EB">Forces Avail score to 40% weight</text>
  </g>

  <!-- Output Panel: Ranked list -->
  <g transform="translate(790, 190)" filter="url(#shadow)">
    <rect width="180" height="180" rx="10" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
    <rect width="180" height="40" rx="10" fill="#ECFDF5" stroke="none"/>
    <path d="M 0 40 L 180 40" stroke="#10B981" stroke-width="1.5"/>
    <text x="90" y="25" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#065F46" text-anchor="middle">Weighted Match Ranker</text>

    <text x="15" y="65" font-family="system-ui, sans-serif" font-size="10" fill="#334155">• Multiplies sub-scores * weights</text>
    <text x="15" y="85" font-family="system-ui, sans-serif" font-size="10" fill="#334155">• Sorts descending by match score</text>
    <text x="15" y="105" font-family="system-ui, sans-serif" font-size="10" fill="#334155">• Deduplicates identical IDs</text>
    <text x="15" y="125" font-family="system-ui, sans-serif" font-size="10" fill="#334155">• Caps final list to max_results</text>
    <rect x="10" y="145" width="160" height="23" rx="4" fill="#D1FAE5" stroke="none"/>
    <text x="90" y="160" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#065F46" text-anchor="middle">🏆 Top Matches List</text>
  </g>

  <!-- Connectors -->
  <!-- Inputs -> Sub-score Evaluators -->
  <path d="M 210 290 L 260 290" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Evaluators -> Weight Mapper -->
  <path d="M 520 290 L 565 290" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Weight Mapper -> Ranker -->
  <path d="M 745 280 L 790 280" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow-blue)"/>
</svg>
