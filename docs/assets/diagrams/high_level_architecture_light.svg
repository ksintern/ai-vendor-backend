<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <defs>
    <!-- Shadows -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <!-- Arrow Markers -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16A34A"/>
    </marker>
    <marker id="arrow-indigo" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4F46E5"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="30" y="45" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#0F172A">High-Level System Architecture</text>
  <text x="30" y="68" font-family="system-ui, sans-serif" font-size="13" fill="#64748B">Request cycle from Frontend Single Page Application to Database and AI Orchestrators (Light Mode)</text>

  <!-- vite UI Client -->
  <g transform="translate(40, 150)" filter="url(#shadow)">
    <rect width="180" height="360" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="180" height="45" rx="12" fill="#EEF2F6" stroke="none"/>
    <path d="M 0 45 L 180 45" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="90" y="27" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#0F172A" text-anchor="middle">Vite UI Frontend</text>
    
    <!-- UI components -->
    <rect x="15" y="70" width="150" height="60" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
    <text x="25" y="93" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1E293B">Chat Interface</text>
    <text x="25" y="113" font-family="system-ui, sans-serif" font-size="10" fill="#64748B">Conversational UI</text>

    <rect x="15" y="150" width="150" height="60" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
    <text x="25" y="173" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1E293B">Vendor Profiles</text>
    <text x="25" y="193" font-family="system-ui, sans-serif" font-size="10" fill="#64748B">Detail view &amp; Catalog</text>

    <rect x="15" y="230" width="150" height="100" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
    <text x="25" y="253" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1E293B">Admin Dashboard</text>
    <text x="25" y="273" font-family="system-ui, sans-serif" font-size="10" fill="#64748B">• Agent Prompts/Config</text>
    <text x="25" y="293" font-family="system-ui, sans-serif" font-size="10" fill="#64748B">• Data Quality &amp; Syncs</text>
  </g>

  <!-- API / FastAPI Container -->
  <g transform="translate(300, 110)" filter="url(#shadow)">
    <rect width="400" height="440" rx="16" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2"/>
    <rect width="400" height="50" rx="16" fill="#EFF6FF" stroke="none"/>
    <path d="M 0 50 L 400 50" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="20" y="31" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#1E40AF">FastAPI Backend Application (Port 8000)</text>
    
    <!-- FastAPI Sub-Containers -->
    <!-- REST Controllers -->
    <rect x="20" y="75" width="360" height="70" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="35" y="100" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#0F172A">API Controllers (Routes)</text>
    <text x="35" y="122" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Exposes routes: /auth, /chat, /query, /vendors, /sessions, /admin</text>

    <!-- Services Layer -->
    <rect x="20" y="165" width="360" height="70" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="35" y="190" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#0F172A">Business Service Layer</text>
    <text x="35" y="212" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Orchestration services: Chat, Vendor, Cleanup, Ingestion Sync</text>

    <!-- LangGraph Workflow -->
    <rect x="20" y="255" width="360" height="75" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
    <text x="35" y="278" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1E40AF">LangGraph Reasoning Workflow</text>
    <text x="35" y="300" font-family="system-ui, sans-serif" font-size="11" fill="#2563EB">Supervisor-driven multi-agent cycle (Context, Search, Compare)</text>
    
    <!-- Repositories & Tools -->
    <rect x="20" y="350" width="360" height="70" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="35" y="375" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#0F172A">Database Tools &amp; Repositories</text>
    <text x="35" y="397" font-family="system-ui, sans-serif" font-size="11" fill="#475569">SQL repositories: VendorRepository, CategoryRepository</text>
  </g>

  <!-- PostgreSQL Database -->
  <g transform="translate(410, 580)">
    <rect x="-10" y="-10" width="200" height="50" rx="20" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="90" y="21" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#065F46" text-anchor="middle">PostgreSQL Database</text>
  </g>

  <!-- AI Providers Box -->
  <g transform="translate(770, 150)" filter="url(#shadow)">
    <rect width="190" height="360" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect width="190" height="45" rx="12" fill="#F5F3FF" stroke="none"/>
    <path d="M 0 45 L 190 45" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="95" y="27" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#4C1D95" text-anchor="middle">AI Model Providers</text>

    <!-- Ollama -->
    <rect x="15" y="70" width="160" height="80" rx="6" fill="#FDF4FF" stroke="#F0ABFC" stroke-width="1"/>
    <text x="25" y="93" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#701A75">Ollama (Local)</text>
    <text x="25" y="113" font-family="system-ui, sans-serif" font-size="10" fill="#A21CAF">Qwen2.5:7b (Extractor)</text>
    <text x="25" y="133" font-family="system-ui, sans-serif" font-size="9" fill="#D946EF">Port 11434 / v1 Endpoint</text>

    <!-- Groq -->
    <rect x="15" y="165" width="160" height="80" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
    <text x="25" y="188" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#166534">Groq Cloud (Remote)</text>
    <text x="25" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#15803D">Llama-3-8b (Responder)</text>
    <text x="25" y="228" font-family="system-ui, sans-serif" font-size="9" fill="#22C55E">API Client Auth</text>

    <!-- Gemini / Modelscope -->
    <rect x="15" y="260" width="160" height="80" rx="6" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1"/>
    <text x="25" y="283" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#334155">Fallback Providers</text>
    <text x="25" y="303" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Google GenAI / Qwen</text>
    <text x="25" y="323" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">Backup pipelines</text>
  </g>

  <!-- Connectors & Labels -->
  <!-- Client <-> FastAPI -->
  <path d="M 220 250 L 300 250" fill="none" stroke="#2563EB" stroke-width="2" marker-end="url(#arrow-blue)" marker-start="url(#arrow-blue)"/>
  <text x="260" y="240" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#2563EB" text-anchor="middle">HTTP REST</text>

  <!-- FastAPI <-> DB -->
  <path d="M 490 550 L 490 570" fill="none" stroke="#16A34A" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="510" y="565" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#16A34A">SQL / PG</text>

  <!-- FastAPI <-> AI Providers -->
  <path d="M 700 330 L 760 330" fill="none" stroke="#4F46E5" stroke-width="2" marker-end="url(#arrow-indigo)"/>
  <text x="730" y="320" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#4F46E5" text-anchor="middle">SDK API</text>
</svg>
