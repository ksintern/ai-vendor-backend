<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 550" width="100%" height="100%">
  <defs>
    <!-- Shadows -->
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <!-- Markers -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#A855F7"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F97316"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0B0F19"/>

  <!-- Title -->
  <text x="30" y="45" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#F8FAFC">LangGraph Agent Reasoning Workflow</text>
  <text x="30" y="68" font-family="system-ui, sans-serif" font-size="13" fill="#94A3B8">Node structure, conditional routers, and execution paths inside the state machine (Dark Mode)</text>

  <!-- START State -->
  <g transform="translate(40, 260)" filter="url(#shadow)">
    <circle r="22" fill="#1E293B" stroke="#475569" stroke-width="1.5"/>
    <text x="0" y="5" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#94A3B8" text-anchor="middle">START</text>
  </g>

  <!-- Supervisor Node -->
  <g transform="translate(130, 230)" filter="url(#shadow)">
    <rect width="120" height="60" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="60" y="27" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#60A5FA" text-anchor="middle">supervisor</text>
    <text x="60" y="44" font-family="system-ui, sans-serif" font-size="10" fill="#93C5FD" text-anchor="middle">Classifies Intent</text>
  </g>

  <!-- Context Node -->
  <g transform="translate(320, 110)" filter="url(#shadow)">
    <rect width="120" height="60" rx="8" fill="#1E293B" stroke="#64748B" stroke-width="1.5"/>
    <text x="60" y="27" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#F8FAFC" text-anchor="middle">context</text>
    <text x="60" y="44" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Loads History</text>
  </g>

  <!-- Query Analysis Node -->
  <g transform="translate(490, 110)" filter="url(#shadow)">
    <rect width="120" height="60" rx="8" fill="#1E293B" stroke="#A855F7" stroke-width="1.5"/>
    <text x="60" y="27" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#C084FC" text-anchor="middle">query_analysis</text>
    <text x="60" y="44" font-family="system-ui, sans-serif" font-size="10" fill="#D8B4FE" text-anchor="middle">Extracts Filters</text>
  </g>

  <!-- Tool Calling Node -->
  <g transform="translate(680, 110)" filter="url(#shadow)">
    <rect width="120" height="60" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="1.5"/>
    <text x="60" y="27" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#34D399" text-anchor="middle">tool_calling</text>
    <text x="60" y="44" font-family="system-ui, sans-serif" font-size="10" fill="#A7F3D0" text-anchor="middle">Fetches DB Data</text>
  </g>

  <!-- Discovery Node -->
  <g transform="translate(850, 110)" filter="url(#shadow)">
    <rect width="120" height="60" rx="8" fill="#1E293B" stroke="#64748B" stroke-width="1.5"/>
    <text x="60" y="27" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#F8FAFC" text-anchor="middle">discovery</text>
    <text x="60" y="44" font-family="system-ui, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">Gathers Vendors</text>
  </g>

  <!-- Ranking Node -->
  <g transform="translate(850, 230)" filter="url(#shadow)">
    <rect width="120" height="60" rx="8" fill="#1E293B" stroke="#F97316" stroke-width="1.5"/>
    <text x="60" y="27" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#FDBA74" text-anchor="middle">ranking</text>
    <text x="60" y="44" font-family="system-ui, sans-serif" font-size="10" fill="#FFEDD5" text-anchor="middle">Scores &amp; Ranks</text>
  </g>

  <!-- Comparison Node -->
  <g transform="translate(490, 360)" filter="url(#shadow)">
    <rect width="120" height="60" rx="8" fill="#1E293B" stroke="#F43F5E" stroke-width="1.5"/>
    <text x="60" y="27" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#FDA4AF" text-anchor="middle">comparison</text>
    <text x="60" y="44" font-family="system-ui, sans-serif" font-size="10" fill="#FECDD3" text-anchor="middle">Compares Entities</text>
  </g>

  <!-- Response Node -->
  <g transform="translate(850, 360)" filter="url(#shadow)">
    <rect width="120" height="60" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="60" y="27" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#60A5FA" text-anchor="middle">response</text>
    <text x="60" y="44" font-family="system-ui, sans-serif" font-size="10" fill="#93C5FD" text-anchor="middle">Formats Output</text>
  </g>

  <!-- END State -->
  <g transform="translate(1010, 390)" filter="url(#shadow)">
    <circle r="22" fill="#1E293B" stroke="#475569" stroke-width="1.5"/>
    <text x="0" y="5" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#94A3B8" text-anchor="middle">END</text>
  </g>

  <!-- Error Node -->
  <g transform="translate(680, 460)" filter="url(#shadow)">
    <rect width="120" height="50" rx="8" fill="#1E293B" stroke="#EF4444" stroke-width="1.5"/>
    <text x="60" y="24" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#FCA5A5" text-anchor="middle">error</text>
    <text x="60" y="38" font-family="system-ui, sans-serif" font-size="9" fill="#EF4444" text-anchor="middle">Handles Failures</text>
  </g>

  <!-- Routers (Decision Diamonds) -->
  <!-- Router 1 -->
  <g transform="translate(290, 260)">
    <polygon points="0,-20 30,0 0,20 -30,0" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="0" y="4" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#60A5FA" text-anchor="middle">R1</text>
  </g>
  <!-- Router 2 -->
  <g transform="translate(650, 260)">
    <polygon points="0,-20 30,0 0,20 -30,0" fill="#1E293B" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="0" y="4" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#60A5FA" text-anchor="middle">R2</text>
  </g>

  <!-- Connectors -->
  <!-- START -> Supervisor -->
  <path d="M 62 260 L 130 260" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Supervisor -> R1 -->
  <path d="M 250 260 L 260 260" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- R1 -> Context (Discovery route) -->
  <path d="M 290 240 C 290 140, 310 140, 320 140" fill="none" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="275" y="170" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#60A5FA">Discovery</text>

  <!-- R1 -> Comparison (Direct) -->
  <path d="M 290 280 C 290 390, 480 390, 490 390" fill="none" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="275" y="340" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#60A5FA">Compare</text>

  <!-- R1 -> Response (Simple Intents) -->
  <path d="M 290 280 C 290 530, 830 530, 890 420" fill="none" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="275" y="470" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#60A5FA">Simple</text>

  <!-- Context -> Query Analysis -->
  <path d="M 440 140 L 490 140" fill="none" stroke="#A855F7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Query Analysis -> Router R2 -->
  <path d="M 550 170 C 550 260, 610 260, 620 260" fill="none" stroke="#A855F7" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- R2 -> Tool Calling -->
  <path d="M 650 240 C 650 140, 670 140, 680 140" fill="none" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="635" y="180" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#60A5FA">Search</text>

  <!-- R2 -> Comparison -->
  <path d="M 650 280 C 650 390, 620 390, 610 390" fill="none" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="635" y="340" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#60A5FA">Compare</text>

  <!-- Tool Calling -> Discovery -->
  <path d="M 800 140 L 850 140" fill="none" stroke="#10B981" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Discovery -> Ranking -->
  <path d="M 910 170 L 910 230" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Ranking -> Response -->
  <path d="M 910 290 L 910 360" fill="none" stroke="#F97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Comparison -> Response -->
  <path d="M 610 390 L 850 390" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Response -> END -->
  <path d="M 970 390 L 988 390" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Error -> END -->
  <path d="M 800 485 C 990 485, 1010 440, 1010 412" fill="none" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
</svg>
